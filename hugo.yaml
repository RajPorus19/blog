baseURL: "https://rajporus19.github.io/blog"
languageCode: "fr-FR"
title: "Porus | Dev curieux"
theme: hugo-profile

defaultContentLanguage: "fr"
defaultContentLanguageInSubdir: false

languages:
  fr:
    languageName: "Français"
    weight: 1
    contentDir: "content/fr"
    menu:
      main:
        - identifier: projects
          name: Projets
          title: Mes projets
          url: /projects
          weight: 1
        - identifier: blog
          name: Articles
          title: Articles & tutos
          url: /blogs
          weight: 2
    params:
      title: "Porus | Dev curieux"
      description: "Dev full-stack qui construit, explore et apprend. Stack agnostique, curiosité infinie."
      navbar:
        brandName: "🏠 Porus"
        searchPlaceholder: "Rechercher..."
      hero:
        enable: true
        image: "/blog/images/avatar.svg"
        roundImage: true
        intro: "Salut, je suis"
        title: "Porus 👋"
        subtitle: "Dev full-stack • Curiosité infinie"
        content: "Dev curieux qui aime build, explorer et déconstruire des trucs."
        button:
          enable: true
          name: "Voir mes projets"
          url: "/blog/projects"
          download: false
          newPage: false
        socialLinks:
          fontAwesomeIcons:
            - icon: fab fa-github
              url: https://github.com/RajPorus19
            - icon: fab fa-linkedin
              url: https://linkedin.com/in/rajporus
      projects:
        enable: true
        title: "🚀 Projets récents"
        items: []
      contact:
        enable: true
        content: |-
          Tu veux collaborer sur un projet ? Me proposer un défi ?  
          Ou juste discuter tech ? Ma boîte de réception est toujours ouverte !
        btnName: "Me contacter"
        btnLink: "mailto:rajporus19@gmail.com"
      footer:
        recentPosts:
          path: "fr/blogs"
          count: 3
          title: "Derniers articles"
          enable: true
          disableFeaturedImage: false
      terms:
        read: "Lire"
        toc: "Sommaire"
        copyright: "Tous droits réservés"
        emailText: "Découvre ce site"
      singlePages:
        readTime:
          content: "min de lecture"

  en:
    languageName: "English"
    weight: 2
    contentDir: "content/en"
    menu:
      main:
        - identifier: projects
          name: Projects
          title: My projects
          url: /en/projects
          weight: 1
        - identifier: blog
          name: Articles
          title: Articles & tutorials
          url: /en/blogs
          weight: 2
    params:
      title: "Porus | Curious dev"
      description: "Full-stack dev who builds, explores and learns. Stack agnostic, infinite curiosity."
      navbar:
        brandName: "🏠 Porus"
        searchPlaceholder: "Search..."
      hero:
        enable: true
        image: "/blog/images/avatar.svg"
        roundImage: true
        intro: "Hi, I'm"
        title: "Porus 👋"
        subtitle: "Full-stack dev • Infinite curiosity"
        content: "Curious dev who loves to build, explore and break things down."
        button:
          enable: true
          name: "See my projects"
          url: "/blog/en/projects"
          download: false
          newPage: false
        socialLinks:
          fontAwesomeIcons:
            - icon: fab fa-github
              url: https://github.com/RajPorus19
            - icon: fab fa-linkedin
              url: https://linkedin.com/in/rajporus
      projects:
        enable: true
        title: "🚀 Recent projects"
        items: []
      contact:
        enable: true
        content: |-
          Want to collaborate on a project? Challenge me with a new idea?  
          Or just talk tech? My inbox is always open!
        btnName: "Contact me"
        btnLink: "mailto:rajporus19@gmail.com"
      footer:
        recentPosts:
          path: "en/blogs"
          count: 3
          title: "Recent posts"
          enable: true
          disableFeaturedImage: false
      terms:
        read: "Read"
        toc: "Table of Contents"
        copyright: "All rights reserved"
        emailText: "Check out this site"
      singlePages:
        readTime:
          content: "min read"

outputs:
  home:
    - "HTML"
    - "RSS"
    - "JSON"
  page:
    - "HTML"
    - "RSS"

enableRobotsTXT: true

pagination:
  pagerSize: 9

markup:
  goldmark:
    renderer:
      unsafe: true

params:
  favicon: "/blog/fav.png"
  useBootstrapCDN: false
  mathjax: false
  animate: true

  hero:
    bottomImage:
      enable: false

  # 🎨 Green theme — fixed contrast
  color:
    textColor: "#1a2e1a"
    secondaryTextColor: "#ffffff"
    backgroundColor: "#f0fdf4"
    secondaryBackgroundColor: "#dcfce7"
    primaryColor: "#16a34a"
    secondaryColor: "#22c55e"

    darkmode:
      textColor: "#e8f5e9"
      secondaryTextColor: "#bbf7d0"
      backgroundColor: "#1a2e1a"
      secondaryBackgroundColor: "#162716"
      primaryColor: "#4ade80"
      secondaryColor: "#166534"

  font:
    fontSize: 1rem
    fontWeight: 400
    lineHeight: 1.5
    textAlign: left

  navbar:
    align: ms-auto
    disableSearch: false
    stickyNavBar:
      enable: true
      showOnScrollUp: true
    enableSeparator: false
    menus:
      disableAbout: true
      disableExperience: true
      disableEducation: true
      disableProjects: false
      disableAchievements: true
      disableContact: false

  socialNetworks:
    github: https://github.com/RajPorus19
    linkedin: https://linkedin.com/in/rajporus19
    twitter: https://x.com/rajporus19

  listPages:
    disableFeaturedImage: false

  singlePages:
    socialShare: true
    scrollprogress:
      enable: true
    tags:
      openInNewTab: true

  datesFormat:
    article: "2 Jan 2006"
    articleList: "2 Jan 2006"
    articleRecent: "2 Jan 2006"
