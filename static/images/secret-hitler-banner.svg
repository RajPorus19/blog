<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#e74c3c"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2471a3"/>
      <stop offset="100%" stop-color="#3498db"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="430" x2="1200" y2="430" stroke="#fff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#fff" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Policy track visual -->
  <g transform="translate(350, 430)">
    <!-- Liberal track -->
    <rect x="0" y="0" width="60" height="20" rx="3" fill="url(#blueGrad)" opacity="0.7"/>
    <rect x="65" y="0" width="60" height="20" rx="3" fill="url(#blueGrad)" opacity="0.7"/>
    <rect x="130" y="0" width="60" height="20" rx="3" fill="url(#blueGrad)" opacity="0.45"/>
    <rect x="195" y="0" width="60" height="20" rx="3" fill="url(#blueGrad)" opacity="0.25"/>
    <rect x="260" y="0" width="60" height="20" rx="3" fill="url(#blueGrad)" opacity="0.1"/>
    <!-- Fascist track -->
    <rect x="0" y="30" width="60" height="20" rx="3" fill="url(#redGrad)" opacity="0.7"/>
    <rect x="65" y="30" width="60" height="20" rx="3" fill="url(#redGrad)" opacity="0.55"/>
    <rect x="130" y="30" width="60" height="20" rx="3" fill="url(#redGrad)" opacity="0.4"/>
    <rect x="195" y="30" width="60" height="20" rx="3" fill="url(#redGrad)" opacity="0.25"/>
    <rect x="260" y="30" width="60" height="20" rx="3" fill="url(#redGrad)" opacity="0.15"/>
    <rect x="325" y="30" width="60" height="20" rx="3" fill="url(#redGrad)" opacity="0.08"/>
  </g>

  <!-- Eagle emblem (stylized) -->
  <g transform="translate(150, 240)" opacity="0.15" filter="url(#glow)">
    <polygon points="0,40 15,0 30,40 20,30 10,30" fill="#e74c3c"/>
    <polygon points="15,0 30,40 25,45 20,35" fill="#c0392b"/>
    <rect x="10" y="40" width="10" height="25" rx="2" fill="#e74c3c"/>
  </g>

  <!-- Title -->
  <text x="60" y="210" font-family="'Georgia', 'Times New Roman', serif" font-size="64" font-weight="bold" fill="#e74c3c" letter-spacing="3" filter="url(#glow)">SECRET HITLER</text>

  <!-- Subtitle -->
  <text x="60" y="260" font-family="'Georgia', 'Times New Roman', serif" font-size="22" fill="#aab" letter-spacing="4">JEU DE SOCIÉTÉ EN LIGNE</text>

  <!-- Badges -->
  <g transform="translate(60, 300)">
    <rect x="0" y="0" width="110" height="28" rx="14" fill="#3498db" opacity="0.8"/>
    <text x="55" y="19" font-family="'Inter', sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="600">Django DRF</text>

    <rect x="120" y="0" width="110" height="28" rx="14" fill="#e74c3c" opacity="0.8"/>
    <text x="175" y="19" font-family="'Inter', sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="600">SvelteKit</text>

    <rect x="240" y="0" width="110" height="28" rx="14" fill="#2ecc71" opacity="0.8"/>
    <text x="295" y="19" font-family="'Inter', sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="600">WebSocket</text>

    <rect x="360" y="0" width="80" height="28" rx="14" fill="#9b59b6" opacity="0.8"/>
    <text x="400" y="19" font-family="'Inter', sans-serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="600">Docker</text>
  </g>

  <!-- Stats -->
  <g transform="translate(60, 365)" font-family="'Inter', sans-serif" font-size="13" fill="#889">
    <text x="0" y="0">87 commits</text>
    <text x="110" y="0">401 tests</text>
    <text x="200" y="0">5 jours de dev</text>
  </g>

  <!-- Card backs decoration -->
  <g transform="translate(900, 160)" opacity="0.3">
    <rect x="0" y="0" width="80" height="120" rx="8" fill="#1a1a2e" stroke="#e74c3c" stroke-width="1.5" transform="rotate(-12)"/>
    <rect x="0" y="0" width="80" height="120" rx="8" fill="#1a1a2e" stroke="#3498db" stroke-width="1.5" transform="rotate(7, 60, 60)"/>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#redGrad)"/>
</svg>
