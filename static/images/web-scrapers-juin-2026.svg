<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Web/scraper illustration -->
  <g transform="translate(80, 100)">
    <!-- Spider web -->
    <g opacity="0.15" stroke="white" stroke-width="1.5">
      <line x1="180" y1="0" x2="180" y2="360"/>
      <line x1="0" y1="180" x2="360" y2="180"/>
      <line x1="53" y1="53" x2="307" y2="307"/>
      <line x1="307" y1="53" x2="53" y2="307"/>
      <!-- Radial rings -->
      <circle cx="180" cy="180" r="60" fill="none"/>
      <circle cx="180" cy="180" r="120" fill="none"/>
      <circle cx="180" cy="180" r="170" fill="none"/>
    </g>
    <!-- Spider (crawler node) -->
    <circle cx="180" cy="180" r="10" fill="white" opacity="0.6"/>
    <circle cx="130" cy="130" r="6" fill="white" opacity="0.3"/>
    <circle cx="230" cy="130" r="6" fill="white" opacity="0.3"/>
    <circle cx="130" cy="230" r="6" fill="white" opacity="0.3"/>
    <circle cx="230" cy="230" r="6" fill="white" opacity="0.3"/>
    <!-- Code brackets -->
    <text x="320" y="165" font-family="monospace" font-size="48" fill="url(#accent)" opacity="0.5">&lt;</text>
    <text x="380" y="210" font-family="monospace" font-size="48" fill="url(#accent)" opacity="0.5">/&gt;</text>
  </g>

  <!-- Title -->
  <text x="420" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="800" fill="white">
    <tspan x="420" dy="0">Les meilleurs</tspan>
    <tspan x="420" dy="46">web scrapers</tspan>
    <tspan x="420" dy="46">en Juin 2026</tspan>
  </text>
  <!-- Subtitle -->
  <text x="420" y="480" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="rgba(255,255,255,0.6)">
    Comparaison, enjeux et recommandations
  </text>
  <!-- Bottom tag pills -->
  <g transform="translate(420, 510)">
    <rect x="0" y="0" width="110" height="28" rx="14" fill="rgba(129,140,248,0.25)"/>
    <text x="55" y="19" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">web scraping</text>
    <rect x="120" y="0" width="60" height="28" rx="14" fill="rgba(129,140,248,0.25)"/>
    <text x="150" y="19" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">tools</text>
    <rect x="190" y="0" width="70" height="28" rx="14" fill="rgba(129,140,248,0.25)"/>
    <text x="225" y="19" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)">2026</text>
  </g>
</svg>