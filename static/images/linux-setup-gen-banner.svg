<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Terminal window -->
  <rect x="70" y="160" width="420" height="320" rx="12" fill="#0d1117" stroke="#30363d" stroke-width="2"/>
  <rect x="70" y="160" width="420" height="36" rx="12" fill="#161b22"/>
  <rect x="70" y="184" width="420" height="12" fill="#161b22"/>
  <circle cx="90" cy="178" r="6" fill="#ff5f56"/>
  <circle cx="110" cy="178" r="6" fill="#ffbd2e"/>
  <circle cx="130" cy="178" r="6" fill="#27ca40"/>
  <text x="280" y="183" font-family="monospace" font-size="13" fill="#8b949e" text-anchor="middle">setup.sh — bash</text>
  <!-- Terminal content -->
  <text x="90" y="220" font-family="monospace" font-size="15" fill="#58a6ff">$</text>
  <text x="104" y="220" font-family="monospace" font-size="15" fill="#f0f6fc">bash setup.sh</text>
  <text x="90" y="250" font-family="monospace" font-size="14" fill="#7ee787">→ Installing selected programs...</text>
  <text x="90" y="278" font-family="monospace" font-size="14" fill="#7ee787">✓ git</text>
  <text x="90" y="302" font-family="monospace" font-size="14" fill="#7ee787">✓ neovim</text>
  <text x="90" y="326" font-family="monospace" font-size="14" fill="#7ee787">✓ docker</text>
  <text x="90" y="350" font-family="monospace" font-size="14" fill="#7ee787">✓ tmux</text>
  <text x="90" y="374" font-family="monospace" font-size="14" fill="#7ee787">✓ ripgrep</text>
  <text x="90" y="410" font-family="monospace" font-size="14" fill="#f0f6fc">$</text>
  <text x="104" y="410" font-family="monospace" font-size="14" fill="#8b949e">█</text>
  <!-- Tux penguin -->
  <g transform="translate(580, 170)">
    <!-- Body -->
    <ellipse cx="120" cy="210" rx="110" ry="130" fill="#1f1f1f"/>
    <!-- Belly -->
    <ellipse cx="120" cy="230" rx="70" ry="85" fill="#f0f0f0"/>
    <!-- Left eye -->
    <ellipse cx="90" cy="165" rx="18" ry="22" fill="white"/>
    <ellipse cx="93" cy="168" rx="10" ry="14" fill="#1f1f1f"/>
    <circle cx="96" cy="163" r="4" fill="white"/>
    <!-- Right eye -->
    <ellipse cx="150" cy="165" rx="18" ry="22" fill="white"/>
    <ellipse cx="147" cy="168" rx="10" ry="14" fill="#1f1f1f"/>
    <circle cx="150" cy="163" r="4" fill="white"/>
    <!-- Beak -->
    <ellipse cx="120" cy="190" rx="16" ry="12" fill="#f5a623"/>
    <ellipse cx="120" cy="188" rx="8" ry="6" fill="#e6910a"/>
    <!-- Left foot -->
    <ellipse cx="85" cy="350" rx="28" ry="14" fill="#f5a623"/>
    <ellipse cx="85" cy="348" rx="20" ry="9" fill="#e6910a"/>
    <!-- Right foot -->
    <ellipse cx="155" cy="350" rx="28" ry="14" fill="#f5a623"/>
    <ellipse cx="155" cy="348" rx="20" ry="9" fill="#e6910a"/>
  </g>
  <!-- Right side text -->
  <text x="880" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="white">Linux Setup</text>
  <text x="880" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="white">Generator</text>
  <text x="880" y="370" font-family="monospace" font-size="20" fill="rgba(255,255,255,0.8)">Pick distro → Choose apps → Get script</text>
  <text x="880" y="410" font-family="monospace" font-size="17" fill="rgba(255,255,255,0.5)">Hugo  •  Vanilla JS  •  GitHub Pages  •  291 programs</text>
  <!-- Bottom strips: distro flags -->
  <g transform="translate(90, 530)">
    <rect x="0" y="0" width="100" height="28" rx="6" fill="#4f46e5" opacity="0.8"/>
    <text x="50" y="19" font-family="monospace" font-size="11" fill="white" text-anchor="middle">Arch</text>
    <rect x="115" y="0" width="100" height="28" rx="6" fill="#e95420" opacity="0.8"/>
    <text x="165" y="19" font-family="monospace" font-size="11" fill="white" text-anchor="middle">Ubuntu</text>
    <rect x="230" y="0" width="100" height="28" rx="6" fill="#dc143c" opacity="0.8"/>
    <text x="280" y="19" font-family="monospace" font-size="11" fill="white" text-anchor="middle">Fedora</text>
    <rect x="345" y="0" width="100" height="28" rx="6" fill="#73ba25" opacity="0.8"/>
    <text x="395" y="19" font-family="monospace" font-size="11" fill="white" text-anchor="middle">openSUSE</text>
    <rect x="460" y="0" width="100" height="28" rx="6" fill="#29553b" opacity="0.8"/>
    <text x="510" y="19" font-family="monospace" font-size="11" fill="white" text-anchor="middle">Void</text>
    <rect x="575" y="0" width="100" height="28" rx="6" fill="#a91d3a" opacity="0.8"/>
    <text x="625" y="19" font-family="monospace" font-size="11" fill="white" text-anchor="middle">Debian</text>
    <rect x="690" y="0" width="100" height="28" rx="6" fill="#0d597f" opacity="0.8"/>
    <text x="740" y="19" font-family="monospace" font-size="11" fill="white" text-anchor="middle">Alpine</text>
  </g>
</svg>
