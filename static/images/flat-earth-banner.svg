<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Flat earth illustration -->
  <g transform="translate(80, 140)">
    <ellipse cx="180" cy="130" rx="140" ry="36" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>
    <ellipse cx="180" cy="130" rx="140" ry="36" fill="rgba(255,255,255,0.06)"/>
    <path d="M40 130 A140 140 0 0 1 320 130" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-dasharray="6,6"/>
    <text x="180" y="150" text-anchor="middle" font-family="serif" font-size="64" fill="rgba(255,255,255,0.4)" font-weight="bold">?</text>
    <circle cx="70" cy="100" r="8" fill="rgba(255,255,255,0.6)"/>
    <circle cx="290" cy="100" r="8" fill="rgba(255,255,255,0.6)"/>
    <line x1="82" y1="100" x2="278" y2="100" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-dasharray="4,3"/>
  </g>
  
  <text x="420" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="800" fill="white">
    <tspan x="420" dy="0">Better a flat earther</tspan>
    <tspan x="420" dy="46">who reasons than an expert</tspan>
    <tspan x="420" dy="46">who can't explain</tspan>
  </text>
  <text x="420" y="510" font-family="monospace" font-size="16" fill="rgba(255,255,255,0.55)">A reflection on epistemology, knowledge &amp; the art of explaining things</text>
</svg>
