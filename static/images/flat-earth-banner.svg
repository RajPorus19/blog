<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Flat earth illustration -->
  <g transform="translate(120, 160)">
    <!-- Flat disk -->
    <ellipse cx="200" cy="130" rx="160" ry="40" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="4"/>
    <ellipse cx="200" cy="130" rx="160" ry="40" fill="rgba(255,255,255,0.08)"/>
    <!-- Dome -->
    <path d="M40 130 A160 160 0 0 1 360 130" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="3" stroke-dasharray="8,8"/>
    <!-- Question mark in center -->
    <text x="200" y="155" text-anchor="middle" font-family="serif" font-size="80" fill="rgba(255,255,255,0.5)" font-weight="bold">?</text>
    <!-- Small figures debating -->
    <circle cx="80" cy="100" r="10" fill="rgba(255,255,255,0.7)"/>
    <circle cx="320" cy="100" r="10" fill="rgba(255,255,255,0.7)"/>
    <!-- Arrow connecting -->
    <line x1="95" y1="100" x2="305" y2="100" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-dasharray="6,4"/>
  </g>
  
  <text x="580" y="280" font-family="system-ui, sans-serif" font-size="38" font-weight="800" fill="white">
    <tspan x="580" dy="0">Better a flat earther</tspan>
    <tspan x="580" dy="50">who reasons</tspan>
    <tspan x="580" dy="50">than an expert</tspan>
    <tspan x="580" dy="50">who can't explain</tspan>
  </text>
  <text x="580" y="530" font-family="monospace" font-size="18" fill="rgba(255,255,255,0.6)">Reflection on epistemology, knowledge &amp; the art of explaining things</text>
</svg>
