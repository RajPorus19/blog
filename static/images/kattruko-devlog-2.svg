<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4A7A55"/>
      <stop offset="100%" stop-color="#3D6546"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6B9F72"/>
      <stop offset="100%" stop-color="#5A8F62"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle decorative dots -->
  <g opacity="0.06">
    <circle cx="100" cy="80" r="80" fill="#fff"/>
    <circle cx="1100" cy="120" r="60" fill="#fff"/>
    <circle cx="1150" cy="550" r="100" fill="#fff"/>
    <circle cx="50" cy="500" r="50" fill="#fff"/>
  </g>

  <!-- Bottom wave -->
  <path d="M0 500 Q150 470 300 500 Q450 530 600 500 Q750 470 900 500 Q1050 530 1200 500 L1200 630 L0 630 Z" fill="#000" opacity="0.12"/>

  <!-- Series badge -->
  <rect x="70" y="50" rx="20" ry="20" width="140" height="40" fill="#F0B27A" opacity="0.9" filter="url(#shadow)"/>
  <text x="140" y="76" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#3D6546" text-anchor="middle">DEVELOP LOG</text>

  <text x="70" y="115" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="800" fill="#FFFFFF" opacity="0.95">Kattruko</text>
  <text x="370" y="115" font-family="Inter, system-ui, sans-serif" font-size="48" font-weight="300" fill="#FFFFFF" opacity="0.7">— #2</text>

  <!-- Subtitle -->
  <text x="70" y="158" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="400" fill="#D4E8D8" opacity="0.9">Design system &amp; identité visuelle — Matcha Latte</text>

  <!-- Accent line -->
  <rect x="70" y="178" width="80" height="3" rx="1.5" fill="#F0B27A" opacity="0.8"/>

  <!-- Palette swatches -->
  <g transform="translate(70, 250)">
    <!-- Matcha -->
    <rect x="0" y="0" width="80" height="80" rx="12" fill="#6B9F72" filter="url(#shadow)"/>
    <text x="40" y="105" font-family="Inter, monospace" font-size="13" font-weight="500" fill="#D4E8D8" text-anchor="middle">#6B9F72</text>
    <text x="40" y="122" font-family="Inter, monospace" font-size="12" font-weight="400" fill="#A8C8B0" text-anchor="middle">Matcha</text>

    <!-- Peach -->
    <rect x="105" y="0" width="80" height="80" rx="12" fill="#F0B27A" filter="url(#shadow)"/>
    <text x="145" y="105" font-family="Inter, monospace" font-size="13" font-weight="500" fill="#D4E8D8" text-anchor="middle">#F0B27A</text>
    <text x="145" y="122" font-family="Inter, monospace" font-size="12" font-weight="400" fill="#A8C8B0" text-anchor="middle">Peach</text>

    <!-- Sky -->
    <rect x="210" y="0" width="80" height="80" rx="12" fill="#74B9CF" filter="url(#shadow)"/>
    <text x="250" y="105" font-family="Inter, monospace" font-size="13" font-weight="500" fill="#D4E8D8" text-anchor="middle">#74B9CF</text>
    <text x="250" y="122" font-family="Inter, monospace" font-size="12" font-weight="400" fill="#A8C8B0" text-anchor="middle">Sky</text>

    <!-- Cream -->
    <rect x="315" y="0" width="80" height="80" rx="12" fill="#F5F7F0" filter="url(#shadow)"/>
    <text x="355" y="105" font-family="Inter, monospace" font-size="13" font-weight="500" fill="#D4E8D8" text-anchor="middle">#F5F7F0</text>
    <text x="355" y="122" font-family="Inter, monospace" font-size="12" font-weight="400" fill="#A8C8B0" text-anchor="middle">Cream</text>
  </g>

  <!-- Theme badges -->
  <g transform="translate(70, 430)">
    <rect x="0" y="0" width="94" height="32" rx="16" fill="#F5F7F0" opacity="0.9"/>
    <circle cx="20" cy="16" r="8" fill="#FFEAA7"/>
    <text x="38" y="21" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#3D6546">Light</text>

    <rect x="108" y="0" width="94" height="32" rx="16" fill="#2D3436" opacity="0.85"/>
    <circle cx="128" cy="16" r="8" fill="#636E72"/>
    <text x="146" y="21" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#D4E8D8">Dark</text>
  </g>

  <!-- Right side ornament -->
  <g transform="translate(850, 200)" opacity="0.35">
    <circle cx="140" cy="140" r="120" fill="none" stroke="#F0B27A" stroke-width="2"/>
    <circle cx="140" cy="140" r="90" fill="none" stroke="#74B9CF" stroke-width="1.5"/>
    <circle cx="140" cy="140" r="55" fill="none" stroke="#6B9F72" stroke-width="1.5"/>
    <circle cx="140" cy="140" r="25" fill="#F0B27A"/>
  </g>

  <!-- Watermark -->
  <text x="1170" y="610" font-family="Inter, sans-serif" font-size="12" font-weight="400" fill="#FFF" opacity="0.25" text-anchor="end">porus.dev</text>
</svg>
