<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5F7F0"/>
      <stop offset="100%" stop-color="#E8F0E6"/>
    </linearGradient>
    <linearGradient id="circle1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6B9F72"/>
      <stop offset="100%" stop-color="#8FB5A0"/>
    </linearGradient>
    <linearGradient id="circle2" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#F0B27A"/>
      <stop offset="100%" stop-color="#F5C99A"/>
    </linearGradient>
    <linearGradient id="circle3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#74B9CF"/>
      <stop offset="100%" stop-color="#9DD0E0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6B9F72" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle background pattern -->
  <g opacity="0.04">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#6B9F72" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#6B9F72" stroke-width="1"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#6B9F72" stroke-width="1"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#6B9F72" stroke-width="1"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#6B9F72" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#6B9F72" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#6B9F72" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#6B9F72" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#6B9F72" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#6B9F72" stroke-width="1"/>
  </g>

  <!-- Left illustration: note -> cards flow -->
  <g transform="translate(80, 120)">
    <!-- Notebook icon -->
    <rect x="0" y="20" width="140" height="180" rx="6" fill="white" filter="url(#shadow)" stroke="#E2E8E0" stroke-width="1.5"/>
    <line x1="20" y1="55" x2="120" y2="55" stroke="#6B9F72" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="75" x2="100" y2="75" stroke="#6B9F72" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="20" y1="90" x2="110" y2="90" stroke="#6B9F72" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="20" y1="105" x2="95" y2="105" stroke="#6B9F72" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="20" y1="130" x2="120" y2="130" stroke="#F0B27A" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="150" x2="105" y2="150" stroke="#F0B27A" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="20" y1="165" x2="115" y2="165" stroke="#F0B27A" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <text x="70" y="12" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#636E72" font-weight="600">NOTES</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(250, 210)">
    <line x1="0" y1="0" x2="60" y2="0" stroke="#8FB5A0" stroke-width="3" stroke-linecap="round"/>
    <polygon points="60,-8 75,0 60,8" fill="#8FB5A0"/>
  </g>

  <!-- Right: study cards floating -->
  <g transform="translate(340, 90)">
    <!-- Card 1 - top -->
    <rect x="0" y="10" width="120" height="80" rx="8" fill="white" filter="url(#shadow)" stroke="#E2E8E0" stroke-width="1" transform="rotate(-12, 60, 50)"/>
    <circle cx="30" cy="38" r="16" fill="url(#circle2)" opacity="0.3" transform="rotate(-12, 60, 50)"/>
    <text x="60" y="42" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" fill="#6B9F72" font-weight="700" transform="rotate(-12, 60, 50)">?</text>
    <line x1="15" y1="60" x2="105" y2="60" stroke="#F0B27A" stroke-width="2.5" stroke-linecap="round" opacity="0.4" transform="rotate(-12, 60, 50)"/>

    <!-- Card 2 - center -->
    <rect x="70" y="60" width="120" height="80" rx="8" fill="white" filter="url(#shadow)" stroke="#E2E8E0" stroke-width="1"/>
    <circle cx="100" cy="88" r="16" fill="url(#circle3)" opacity="0.3"/>
    <text x="130" y="93" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" fill="#74B9CF" font-weight="700">A</text>
    <line x1="85" y1="108" x2="175" y2="108" stroke="#74B9CF" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
    <text x="130" y="125" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#636E72">Apprentissage</text>

    <!-- Card 3 - bottom -->
    <rect x="30" y="120" width="120" height="80" rx="8" fill="white" filter="url(#shadow)" stroke="#E2E8E0" stroke-width="1" transform="rotate(8, 90, 160)"/>
    <circle cx="60" cy="148" r="16" fill="url(#circle1)" opacity="0.3" transform="rotate(8, 90, 160)"/>
    <text x="90" y="153" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" fill="#6B9F72" font-weight="700" transform="rotate(8, 90, 160)">B</text>
    <line x1="45" y1="168" x2="135" y2="168" stroke="#6B9F72" stroke-width="2.5" stroke-linecap="round" opacity="0.4" transform="rotate(8, 90, 160)"/>
  </g>

  <!-- Brand accent dot -->
  <circle cx="680" cy="200" r="8" fill="#6B9F72" opacity="0.3"/>

  <!-- Title text -->
  <text x="720" y="240" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="48" font-weight="800" fill="#2D3436">
    Kattruko
  </text>
  <text x="720" y="290" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#6B9F72">
    Devlog 1
  </text>
  <text x="720" y="340" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="20" fill="#636E72" font-weight="400">
    Idée et conception du produit
  </text>

  <!-- Decorative line under title -->
  <line x1="720" y1="370" x2="920" y2="370" stroke="#F0B27A" stroke-width="3" stroke-linecap="round"/>

  <!-- Tags -->
  <g transform="translate(720, 400)">
    <rect x="0" y="0" width="100" height="26" rx="13" fill="#6B9F72" opacity="0.12"/>
    <text x="50" y="17" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#6B9F72" font-weight="600">devlog</text>

    <rect x="112" y="0" width="120" height="26" rx="13" fill="#74B9CF" opacity="0.12"/>
    <text x="172" y="17" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#74B9CF" font-weight="600">study-app</text>

    <rect x="244" y="0" width="100" height="26" rx="13" fill="#F0B27A" opacity="0.12"/>
    <text x="294" y="17" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#D4924A" font-weight="600">obsidian</text>
  </g>

  <!-- Bottom decorative wave -->
  <path d="M0 560 Q150 530 300 560 Q450 590 600 560 Q750 530 900 560 Q1050 590 1200 560 L1200 630 L0 630 Z" fill="#6B9F72" opacity="0.06"/>

  <!-- Bottom text -->
  <text x="600" y="590" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#B2BEC3">Un study companion connecté à votre Obsidian vault</text>
</svg>
