<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6B9F72"/>
      <stop offset="60%" stop-color="#5A8F62"/>
      <stop offset="100%" stop-color="#4A7F52"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.95)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.85)"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.78)"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F0B27A"/>
      <stop offset="100%" stop-color="#F5C99A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="rgba(255,255,255,0.04)"/>
  <circle cx="1100" cy="530" r="250" fill="rgba(255,255,255,0.03)"/>
  <circle cx="800" cy="-50" r="150" fill="rgba(255,255,255,0.05)"/>

  <!-- Study cards illustration -->
  <g transform="translate(80, 120)">
    <!-- Card 1 - flashcards -->
    <rect x="0" y="80" width="160" height="110" rx="10" fill="url(#card1)" transform="rotate(-6, 80, 135)" filter="url(#shadow)"/>
    <circle cx="50" cy="115" r="22" fill="#6B9F72" opacity="0.15" transform="rotate(-6, 80, 135)"/>
    <text x="80" y="120" text-anchor="middle" font-family="system-ui, sans-serif" font-size="32" fill="#6B9F72" font-weight="700" transform="rotate(-6, 80, 135)">?</text>
    <line x1="30" y1="145" x2="130" y2="145" stroke="#E2E8E0" stroke-width="2" stroke-linecap="round" transform="rotate(-6, 80, 135)"/>
    <line x1="30" y1="162" x2="110" y2="162" stroke="#E2E8E0" stroke-width="2" stroke-linecap="round" transform="rotate(-6, 80, 135)"/>

    <!-- Card 2 - quiz -->
    <rect x="50" y="30" width="160" height="110" rx="10" fill="url(#card2)" transform="rotate(4, 130, 85)"/>
    <circle cx="100" cy="65" r="22" fill="#F0B27A" opacity="0.2" transform="rotate(4, 130, 85)"/>
    <text x="130" y="70" text-anchor="middle" font-family="system-ui, sans-serif" font-size="32" fill="#F0B27A" font-weight="700" transform="rotate(4, 130, 85)">A</text>
    <line x1="80" y1="92" x2="180" y2="92" stroke="#E2E8E0" stroke-width="2" stroke-linecap="round" transform="rotate(4, 130, 85)"/>

    <!-- Card 3 - brain -->
    <rect x="110" y="130" width="160" height="110" rx="10" fill="url(#card1)" transform="rotate(-3, 190, 185)"/>
    <circle cx="160" cy="165" r="22" fill="#74B9CF" opacity="0.2" transform="rotate(-3, 190, 185)"/>
    <text x="190" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="32" fill="#74B9CF" font-weight="700" transform="rotate(-3, 190, 185)">B</text>
    <line x1="140" y1="192" x2="240" y2="192" stroke="#E2E8E0" stroke-width="2" stroke-linecap="round" transform="rotate(-3, 190, 185)"/>
  </g>

  <!-- Connecting lines between cards -->
  <g stroke="rgba(255,255,255,0.15)" stroke-width="2" fill="none">
    <path d="M190 195 Q220 210 250 200" stroke-dasharray="4,4"/>
    <path d="M80 160 Q110 170 140 165" stroke-dasharray="4,4"/>
  </g>

  <!-- Right side content -->
  <g transform="translate(420, 0)">
    <!-- Tag pill -->
    <rect x="0" y="170" width="95" height="28" rx="14" fill="rgba(255,255,255,0.15)"/>
    <text x="47.5" y="189" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="rgba(255,255,255,0.8)" font-weight="600">DEVLOG</text>

    <!-- Main title -->
    <text x="0" y="235" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="white" letter-spacing="-1">Kattruko</text>
    <text x="0" y="290" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="30" font-weight="600" fill="rgba(255,255,255,0.85)">Devlog 1</text>

    <!-- Accent underline -->
    <rect x="0" y="310" width="60" height="4" rx="2" fill="url(#accent)"/>

    <!-- Subtitle -->
    <text x="0" y="350" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="22" fill="rgba(255,255,255,0.7)">Idée et conception du produit</text>

    <!-- Description line -->
    <text x="0" y="400" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="15" fill="rgba(255,255,255,0.45)">Study companion connecté à Obsidian</text>
  </g>

  <!-- Bottom wave -->
  <path d="M0 560 Q200 540 400 560 Q600 580 800 560 Q1000 540 1200 560 L1200 630 L0 630 Z" fill="rgba(255,255,255,0.05)"/>
</svg>
